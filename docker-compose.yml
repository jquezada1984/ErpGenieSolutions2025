services:
  # Microservicio Python (Flask) - InicioPython
  python-service:
    build:
      context: ./InicioPython
      dockerfile: Dockerfile
    container_name: erp-python-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here}
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    networks:
      - erp-network
    volumes:
      - python_data:/app/data

  # Backend NestJS (GraphQL) - InicioNestJs
  nestjs-service:
    build:
      context: ./InicioNestJs
      dockerfile: Dockerfile
    container_name: erp-nestjs-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:-your-secret-key-here}
    ports:
      - "3001:3001"
    networks:
      - erp-network

  # MenuNestJs (Servicio de Menús)
  menu-service:
    build:
      context: ./MenuNestJs
      dockerfile: Dockerfile
    container_name: erp-menu-service
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:-your-secret-key-here}
    ports:
      - "3003:3003"
    networks:
      - erp-network

  # =========================
  # NUEVO: TerceroPython (REST)
  # =========================
  tercero-python-service:
    build:
      context: ./TerceroPython
      dockerfile: Dockerfile
    container_name: erp-tercero-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here}
      - FLASK_ENV=production
      - PORT=3004
    ports:
      - "3004:3004"
    networks:
      - erp-network

  # =========================
  # NUEVO: TerceroNestJs (GraphQL - Presentación/Lectura)
  # =========================
  tercero-nestjs-service:
    build:
      context: ./TerceroNestJs
      dockerfile: Dockerfile
    container_name: erp-tercero-nestjs-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:-your-secret-key-here}
    # Externo 3005 para NO chocar con InicioNestJs (3001)
    ports:
      - "3005:3001"
    networks:
      - erp-network

  # Gateway API (Fastify)
  gateway-api:
    build:
      context: ./gateway-api
      dockerfile: Dockerfile
    container_name: erp-gateway-api
    environment:
      - NODE_ENV=production

      # Servicios existentes
      - PYTHON_SERVICE_URL=http://python-service:5000
      - NESTJS_SERVICE_URL=http://nestjs-service:3001
      - MENU_SERVICE_URL=http://menu-service:3003

      # ✅ Canales específicos Tercero
      - TERCERO_PY_BASE_URL=http://tercero-python-service:3004
      - TERCERO_PY_TIMEOUT=15000

      # ✅ TerceroNestJs por GraphQL (lectura/presentación)
      - TERCERO_NEST_GQL_URL=http://tercero-nestjs-service:3001

      # Gateway
      - GATEWAY_PORT=3002
      - CORS_ORIGIN=http://localhost:3000,http://localhost:5173
      - LOG_LEVEL=info
    ports:
      - "3002:3002"
    depends_on:
      - python-service
      - nestjs-service
      - menu-service
      - tercero-python-service
      - tercero-nestjs-service
    networks:
      - erp-network

  # Frontend React (Nginx)
  frontend:
    build:
      context: ./frontReact
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway-api
    networks:
      - erp-network

volumes:
  python_data:

networks:
  erp-network:
    driver: bridge

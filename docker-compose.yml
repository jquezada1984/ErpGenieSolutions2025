services:
  # Microservicio Python (Flask) - InicioPython
  python-service:
    build:
      context: ./InicioPython
      dockerfile: Dockerfile
    container_name: erp-python-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    networks:
      - erp-network
    volumes:
      - python_data:/app/data

  # Backend NestJS (GraphQL) - InicioNestJs
  nestjs-service:
    build:
      context: ./InicioNestJs
      dockerfile: Dockerfile
    container_name: erp-nestjs-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
      - PYTHON_SERVICE_URL=http://python-service:5000
    ports:
      - "3001:3001"
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3001,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  # MenuNestJs (Servicio de Menús)
  menu-service:
    build:
      context: ./MenuNestJs
      dockerfile: Dockerfile
    container_name: erp-menu-service
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
    ports:
      - "3003:3003"
    networks:
      - erp-network

  # =========================
  # NUEVO: TerceroPython (REST)
  # =========================
  tercero-python-service:
    build:
      context: ./TerceroPython
      dockerfile: Dockerfile
    container_name: erp-tercero-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
      - FLASK_ENV=production
      - PORT=3004
    ports:
      - "3004:3004"
    networks:
      - erp-network

  # =========================
  # NUEVO: TerceroNestJs (GraphQL - Presentación/Lectura)
  # =========================
  tercero-nestjs-service:
    build:
      context: ./TerceroNestJs
      dockerfile: Dockerfile
    container_name: erp-tercero-nestjs-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
    # Externo 3006 para NO chocar con InicioNestJs (3001) ni ContabilidadNestJs (3005)
    ports:
      - "3006:3001"
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3001,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  # =========================
  # ContabilidadPython (REST)
  # =========================
  contabilidad-python-service:
    build:
      context: ./ContabilidadPython
      dockerfile: Dockerfile
    container_name: erp-contabilidad-python-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
      - FLASK_ENV=production
      - PORT=5002
    ports:
      - "5002:5002"
    networks:
      - erp-network
    volumes:
      - contabilidad_python_data:/app/data


# =========================
  # NUEVO: MediaServiceNestJs (Servicio de contenido multimedia)
  # =========================
  media-service:
    build:
      context: ./MediaServiceNestJs
      dockerfile: Dockerfile
    container_name: erp-media-service
    environment:
      - NODE_ENV=production
      - PORT=3010
      - PUBLIC_BASE_URL=http://localhost:3010
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "3010:3010"
    networks:
      - erp-network
    volumes:
      - media_uploads:/app/uploads


  # =========================
  # ContabilidadNestJs (GraphQL)
  # =========================
  contabilidad-nestjs-service:
    build:
      context: ./ContabilidadNestJs
      dockerfile: Dockerfile
    container_name: erp-contabilidad-nestjs-service
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
    ports:
      - "3005:3005"
    networks:
      - erp-network

  # =========================
  # BancoCajaPython (REST)
  # =========================
  banco-caja-python-service:
    build:
      context: ./BancoCajaPython
      dockerfile: Dockerfile
    container_name: erp-banco-caja-python-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
      - FLASK_ENV=production
      - PORT=3015
    ports:
      - "3015:3015"
    networks:
      - erp-network

  # =========================
  # BancoCajaNestJs (GraphQL)
  # =========================
  banco-caja-nestjs-service:
    build:
      context: ./BancoCajaNestJs
      dockerfile: Dockerfile
    container_name: erp-banco-caja-nestjs-service
    environment:
      - NODE_ENV=production
      - PORT=3016
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
    ports:
      - "3016:3016"
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3016,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 25s

  # =========================
  # FinancieroPython (REST)
  # =========================
  financiero-python-service:
    build:
      context: ./FinancieroPython
      dockerfile: Dockerfile
    container_name: erp-financiero-python-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
      - FLASK_ENV=production
      - PORT=5001
    ports:
      - "5001:5001"
    networks:
      - erp-network
    volumes:
      - financiero_python_data:/app/data

  # =========================
  # FinancieroNestJs (GraphQL)
  # =========================
  financiero-nestjs-service:
    build:
      context: ./FinancieroNestJs
      dockerfile: Dockerfile
    container_name: erp-financiero-nestjs-service
    environment:
      - NODE_ENV=production
      - PORT=3007
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:?Define_JWT_SECRET_KEY_in_environment}
    ports:
      - "3007:3007"
    networks:
      - erp-network

# =========================
  # ItemNestJs (GraphQL - Lectura catálogos item)
  # =========================
  item-nestjs-service:
    build:
      context: ./ItemNestJs
      dockerfile: Dockerfile
    container_name: erp-item-nestjs-service
    environment:
      - NODE_ENV=production
      - PORT=3011
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:-your-secret-key-here}
    ports:
      - "3011:3011"
    networks:
      - erp-network

  # =========================
  # ItemPython (REST - Escritura módulo item)
  # =========================
  item-python-service:
    build:
      context: ./ItemPython
      dockerfile: Dockerfile
    container_name: erp-item-python-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here}
      - FLASK_ENV=production
      - PORT=3012
    ports:
      - "3012:3012"
    networks:
      - erp-network

  # =========================
  # InventarioPython (REST - Escritura inventario)
  # =========================
  inventario-python-service:
    build:
      context: ./InventarioPython
      dockerfile: Dockerfile
    container_name: erp-inventario-python-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3002,http://localhost:5173}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here}
      - FLASK_ENV=production
      - PORT=3014
    ports:
      - "3014:3014"
    networks:
      - erp-network

  # =========================
  # InventarioNestJs (GraphQL - Lectura inventario)
  # =========================
  inventario-nestjs-service:
    build:
      context: ./InventarioNestJs
      dockerfile: Dockerfile
    container_name: erp-inventario-nestjs-service
    environment:
      - NODE_ENV=production
      - PORT=3013
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET_KEY:-your-secret-key-here}
    ports:
      - "3013:3013"
    networks:
      - erp-network







  # Gateway API (Fastify)
  gateway-api:
    build:
      context: ./gateway-api
      dockerfile: Dockerfile
    container_name: erp-gateway-api
    environment:
      - NODE_ENV=production

      # Servicios existentes
      - PYTHON_SERVICE_URL=http://python-service:5000
      - NESTJS_SERVICE_URL=http://nestjs-service:3001
      - MENU_SERVICE_URL=http://menu-service:3003
      # ✅ Canales específicos Item (lectura catálogos = ItemNestJs; escritura = ItemPython)
      - MEDIA_SERVICE_BASE_URL=http://media-service:3010

      # ✅ Canal ItemNestJs (base URL sin /graphql; el cliente añade /graphql)
      - ITEM_NEST_GQL_URL=http://item-nestjs-service:3011
      # ✅ Canal específico ItemPython (escritura)
      - ITEM_PY_BASE_URL=http://item-python-service:3012

      # ✅ Canales específicos Inventario
      - INVENTARIO_PY_BASE_URL=http://inventario-python-service:3014
      - INVENTARIO_NEST_GQL_URL=http://inventario-nestjs-service:3013

      # ✅ Canales específicos Tercero
      - TERCERO_PY_BASE_URL=http://tercero-python-service:3004
      - TERCERO_PY_TIMEOUT=15000

      # ✅ TerceroNestJs por GraphQL (lectura/presentación)
      - TERCERO_NEST_GQL_URL=http://tercero-nestjs-service:3001

      # ✅ Canales específicos Contabilidad
      - CONTABILIDAD_PY_BASE_URL=http://contabilidad-python-service:5002
      - CONTABILIDAD_NEST_GQL_URL=http://contabilidad-nestjs-service:3005

      # ✅ Canales específicos Financiero
      - FINANCIERO_PY_BASE_URL=http://financiero-python-service:5001
      - FINANCIERO_NEST_GQL_URL=http://financiero-nestjs-service:3007

      # ✅ Canales específicos Banco-Caja
      - BANCO_CAJA_PY_BASE_URL=http://banco-caja-python-service:3015
      - BANCO_CAJA_NEST_GQL_URL=http://banco-caja-nestjs-service:3016

      # ✅ Canales específicos Media
      - MEDIA_SERVICE_BASE_URL=http://media-service:3010
      # Gateway
      - GATEWAY_PORT=3002
      - CORS_ORIGIN=http://localhost:3000,http://localhost:5173
      - LOG_LEVEL=info
    ports:
      - "3002:3002"
    depends_on:
      python-service:
        condition: service_started
      nestjs-service:
        condition: service_healthy
      menu-service:
        condition: service_started
      tercero-python-service:
        condition: service_started
      tercero-nestjs-service:
        condition: service_healthy
      contabilidad-python-service:
        condition: service_started
      contabilidad-nestjs-service:
        condition: service_started
      financiero-python-service:
        condition: service_started
      financiero-nestjs-service:
        condition: service_started
      item-nestjs-service:
        condition: service_started
      item-python-service:
        condition: service_started
      banco-caja-python-service:
        condition: service_started
      banco-caja-nestjs-service:
        condition: service_healthy
      inventario-python-service:
        condition: service_started
      inventario-nestjs-service:
        condition: service_started
    networks:
      - erp-network

  # Frontend React (Nginx)
  frontend:
    build:
      context: ./frontReact
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway-api
    networks:
      - erp-network

volumes:
  python_data:
  contabilidad_python_data:
  financiero_python_data:
  media_uploads:

networks:
  erp-network:
    driver: bridge

  
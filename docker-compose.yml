services:
  # Microservicio Python (Flask)
  python-service:
    build:
      context: ./InicioPython
      dockerfile: Dockerfile
    container_name: erp-python-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3002,http://localhost:5173
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here}
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    networks:
      - erp-network
    volumes:
      - python_data:/app/data

  # Backend NestJS (GraphQL)
  nestjs-service:
    build:
      context: ./InicioNestJs
      dockerfile: Dockerfile
    container_name: erp-nestjs-service
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-here}
    ports:
      - "3001:3001"
    networks:
      - erp-network

  # MenuNestJs (Servicio de Menús)
  menu-service:
    build:
      context: ./MenuNestJs
      dockerfile: Dockerfile
    container_name: erp-menu-service
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-here}
    ports:
      - "3003:3003"
    networks:
      - erp-network

  # Microservicio Python Financiero (Flask)
  financiero-python-service:
    build:
      context: ./FinancieroPython
      dockerfile: Dockerfile
    container_name: erp-financiero-python-service
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3002,http://localhost:5173
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-here}
      - FLASK_ENV=production
      - PORT=5001
    ports:
      - "5001:5001"
    networks:
      - erp-network
    volumes:
      - financiero_python_data:/app/data

  # Backend NestJS Financiero (GraphQL)
  financiero-nestjs-service:
    build:
      context: ./FinancieroNestJs
      dockerfile: Dockerfile
    container_name: erp-financiero-nestjs-service
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/database.db}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-here}
      - PORT=3004
    ports:
      - "3004:3004"
    networks:
      - erp-network

  # Gateway API (Fastify)
  gateway-api:
    build:
      context: ./gateway-api
      dockerfile: Dockerfile
    container_name: erp-gateway-api
    environment:
      - NODE_ENV=production
      - PYTHON_SERVICE_URL=http://python-service:5000
      - NESTJS_SERVICE_URL=http://nestjs-service:3001
      - MENU_SERVICE_URL=http://menu-service:3003
      - FINANCIERO_PYTHON_SERVICE_URL=http://financiero-python-service:5001
      - FINANCIERO_NESTJS_SERVICE_URL=http://financiero-nestjs-service:3004
      - GATEWAY_PORT=3002
      - CORS_ORIGIN=http://localhost:3000,http://localhost:5173
    ports:
      - "3002:3002"
    depends_on:
      - python-service
      - nestjs-service
      - menu-service
      - financiero-python-service
      - financiero-nestjs-service
    networks:
      - erp-network

  # Frontend React (Nginx)
  frontend:
    build:
      context: ./frontReact
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway-api
    networks:
      - erp-network

volumes:
  python_data:
  financiero_python_data:

networks:
  erp-network:
    driver: bridge
